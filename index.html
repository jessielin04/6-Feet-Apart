<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>6 Feet Apart</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>

<!--background music (autoplay + loop)-->
<audio id="bg-music" src="assets/audio/tomodachi-life-bgmusic.mp3" loop></audio>
<!--button click sound effect-->
<audio id="sfx-btn" src="assets/audio/buttons-sound-effect.mp3"></audio>

<div id="app">
    <!--LAUNCH page-->
    <div id="screen-home" class="screen active">
        <!--title + blurb-->
        <h1 class="title-font">6 Feet Apart</h1>
        <p class="subtitle">How close are we?</p>
        <!--mii with arrows-->
        <div class="mii-row">
            <img src="assets/miis/soccer girl.png"  class="bob"             alt="soccer girl"/>
            <span class="arrow-between" style="transform: rotate(-15deg)">→</span>
            <img src="assets/miis/school girl.png"  class="bob bob-delay-1" alt="school girl"/>
            <span class="arrow-between" style="transform: rotate(10deg)">→</span>
            <img src="assets/miis/chef.png"          class="bob bob-delay-2" alt="chef"/>
            <span class="arrow-between" style="transform: rotate(-8deg)">→</span>
            <img src="assets/miis/teacher.png"       class="bob bob-delay-3" alt="teacher"/>
            <span class="arrow-between" style="transform: rotate(12deg)">→</span>
            <img src="assets/miis/burger boy.png"    class="bob bob-delay-4" alt="burger boy"/>
            <span class="arrow-between" style="transform: rotate(-10deg)">→</span>
            <img src="assets/miis/firefighter.png"   class="bob bob-delay-5" alt="firefighter"/>
        </div>

        <!--buttons-->
        <div class="btn-row">
            <button class="btn btn-pink" onclick="showScreen('screen-settings')">settings</button>
            <button class="btn btn-pink" onclick="showScreen('screen-search')">search</button>
            <button class="btn btn-pink" onclick="showScreen('screen-credits')">credits</button>
        </div>

    </div>
    <!--LAUNCH end-->

    <!--SETTINGS page-->
    <div id="screen-settings" class="screen">
        <!--title-->
        <h1 class="title-font settings-title">Settings</h1>
        <p class="subtitle">Customize your experience!</p>
        <!--settings options + mii-->
        <div class="settings-layout">
            <!--LEFT: options-->
            <div class="settings-options">
                <!--music-->
                <div class="settings-row">
                    <span class="settings-label">music?</span>
                    <div class="settings-btns">
                        <button class="btn btn-sky settings-toggle active-toggle" onclick="toggle(this); handleMusicToggle(this)">yes</button>
                        <button class="btn btn-sky-dim settings-toggle"           onclick="toggle(this); handleMusicToggle(this)">no</button>
                    </div>
                </div>

                <!--sound effects-->
                <div class="settings-row">
                    <span class="settings-label">sound effects?</span>
                    <div class="settings-btns">
                        <button class="btn btn-sky settings-toggle active-toggle" onclick="toggle(this)">yes</button>
                        <button class="btn btn-sky-dim settings-toggle"           onclick="toggle(this)">no</button>
                    </div>
                </div>
            </div>
            <!--RIGHT: mii-->
            <img src="assets/miis/3ds mii.png" class="settings-mii" alt="settings mii" />

        </div>

        <!--back button-->
        <div class="btn-row">
            <button class="btn btn-pink" onclick="showScreen('screen-home')">back</button>
        </div>

    </div>
    <!--SETTINGS end-->

</div>

<script src="script.js"></script>
</body>
</html>
